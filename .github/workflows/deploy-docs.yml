name: deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'dbt/hw1/models/**'
      - 'dbt/hw1/macros/**'
      - 'dbt/hw1/dbt_project.yml'
      - 'dbt/hw1/docs/**' # какие файлы должны измениться, чтобы запустился workflow

jobs:
  deploy-docs:
    name: Разворачиваем документацию прода
    runs-on: ubuntu-latest
    permissions:
      contents: write # Права на запись в содержимое репозитория
      pages: write # Права на запись в GitHub Pages
    
    steps:
      - name: Скачиваем репозиторий
        uses: actions/checkout@v4
      
      - name: Загружаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Устанавливаем зависимости python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Устанавливаем зависимости dbt
        run: |
          cd dbt/hw1
          dbt deps
      
      - name: Генерируем документацию (dev)
        run: |
          dbt docs generate --target dev
          echo "✅ Дев документация сгенерирована"
      
      - name: Готовим файлы для развертывания
        run: |
          mkdir -p docs-build
          cp -r dbt/hw1/target/* docs-build/
          # Копируем основную документацию в корень
          cp dbt/hw1/target/index.html docs-build/index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-build
          publish_branch: gh-pages
          destination_dir: . # . означает корень ветки gh-pages
          commit_message: "docs: разрветывание документации для ${{ github.sha }}"