hw1:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: "{{ env_var('DBT_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: "{{ env_var('DBT_SCHEMA') }}"
      threads: 4
    ci:
      dbname: "{{ env_var('POSTGRES_DB') }}"
      host: "{{ env_var('DBT_HOST') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: "{{ env_var('DBT_PORT') | int }}"
      schema: "{{ env_var('DBT_SCHEMA') }}"
      threads: 1
      type: postgres
      user: "{{ env_var('POSTGRES_USER') }}"